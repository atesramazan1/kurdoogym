<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kişisel İngilizce Kelime Defteri</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .active-tab { color: #007AFF; }
        
        .flip-card { background-color: transparent; perspective: 1000px; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; top:0; left:0; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: 1rem; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .flip-card-back { transform: rotateY(180deg); }
        
        .spinner { border: 3px solid rgba(0,0,0,0.1); width: 20px; height: 20px; border-radius: 50%; border-left-color: #007AFF; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        .dark .spinner { border: 3px solid rgba(255,255,255,0.1); border-left-color: #3b82f6; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 dark:bg-zinc-900 dark:text-gray-100 transition-colors duration-200">

    <!-- Köşe Bildirim Paneli (Toast) -->
    <div id="toastContainer" class="fixed top-5 right-5 left-5 max-w-xs mx-auto md:left-auto z-[100] pointer-events-none space-y-2"></div>

    <div class="max-w-md mx-auto min-h-screen flex flex-col bg-white dark:bg-zinc-800 shadow-2xl relative pb-[80px]">
        
        <main class="flex-1 p-4 overflow-y-auto">
            
            <section id="screen-dashboard" class="space-y-6">
                <div class="bg-blue-50 dark:bg-blue-900/30 p-5 rounded-2xl">
                    <div class="flex justify-between text-sm font-semibold text-blue-600 dark:text-blue-400 mb-2">
                        <span>Öğrenme İlerlemen</span>
                        <span id="progressPercent">%0</span>
                    </div>
                    <div class="w-full bg-gray-200 dark:bg-zinc-700 h-2.5 rounded-full overflow-hidden">
                        <div id="progressBar" class="bg-blue-600 h-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                    <p id="progressText" class="text-xs text-gray-500 dark:text-gray-400 mt-3 font-medium">0 / 0 Kelime Tamamlandı</p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-gray-50 dark:bg-zinc-700/50 p-4 rounded-xl text-center border border-gray-100 dark:border-zinc-700">
                        <span class="text-xs font-bold text-gray-400 block mb-1">TOPLAM KELİME</span>
                        <div id="statTotal" class="text-3xl font-black text-blue-600">0</div>
                    </div>
                    <div class="bg-gray-50 dark:bg-zinc-700/50 p-4 rounded-xl text-center border border-gray-100 dark:border-zinc-700">
                        <span class="text-xs font-bold text-gray-400 block mb-1">TEKRAR GEREKEN</span>
                        <div id="statReview" class="text-3xl font-black text-orange-500">0</div>
                    </div>
                </div>
                <div>
                    <h3 class="font-bold text-lg mb-3">Son Eklenen Kelimeler (En Fazla 10)</h3>
                    <div id="recentWordsList" class="space-y-2"></div>
                </div>
            </section>

            <section id="screen-words" class="hidden space-y-4">
                <div class="flex justify-between items-center bg-white dark:bg-zinc-800 sticky top-0 py-2 z-10">
                    <h2 class="text-xl font-bold">Defterim</h2>
                    <button onclick="openModal()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-md hover:bg-blue-700 transition">+ Yeni Ekle</button>
                </div>

                <!-- Kategori ve Filtreleme Alanı -->
                <div class="grid grid-cols-2 gap-2 bg-gray-50 dark:bg-zinc-700 p-2 rounded-xl border border-gray-100 dark:border-zinc-600">
                    <div>
                        <label class="text-[9px] font-bold text-gray-400 block ml-1 mb-1">SEVİYE FİLTRESİ</label>
                        <select id="listLevelFilter" onchange="renderWordsList(true)" class="w-full p-2 bg-white dark:bg-zinc-800 rounded-lg text-xs font-bold outline-none border border-gray-200 dark:border-zinc-600">
                            <option value="ALL">Tüm Seviyeler</option>
                            <option value="A1">A1</option> <option value="A2">A2</option>
                            <option value="B1">B1</option> <option value="B2">B2</option> <option value="C1">C1</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-gray-400 block ml-1 mb-1">TÜR FİLTRESİ</label>
                        <select id="listTypeFilter" onchange="renderWordsList(true)" class="w-full p-2 bg-white dark:bg-zinc-800 rounded-lg text-xs font-bold outline-none border border-gray-200 dark:border-zinc-600">
                            <option value="ALL">Tüm Türler</option>
                            <option value="Noun">İsim (Noun)</option> <option value="Verb">Fiil (Verb)</option>
                            <option value="Adjective">Sıfat (Adj)</option> <option value="Adverb">Zarf (Adv)</option>
                        </select>
                    </div>
                </div>

                <div id="wordsList" class="space-y-3 pb-4"></div>
            </section>

            <section id="screen-study" class="hidden space-y-4">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-xl font-bold">Çalışma Merkezi</h2>
                </div>
                
                <div class="flex gap-2 mb-4 bg-gray-50 dark:bg-zinc-700 p-2 rounded-xl border border-gray-100 dark:border-zinc-600">
                    <div class="flex-1">
                        <label class="text-[10px] font-bold text-gray-400 block ml-1 mb-1">SEVİYE FİLTRESİ</label>
                        <select id="studyLevelFilter" class="w-full p-2 bg-white dark:bg-zinc-800 rounded-lg text-sm font-bold outline-none border border-gray-200 dark:border-zinc-600 text-blue-600 dark:text-blue-400">
                            <option value="ALL">Tüm Seviyeler</option>
                            <option value="A1">A1 Sadece</option> <option value="A2">A2 Sadece</option>
                            <option value="B1">B1 Sadece</option> <option value="B2">B2 Sadece</option>
                        </select>
                    </div>
                    <div class="w-24">
                        <label class="text-[10px] font-bold text-gray-400 block ml-1 mb-1">SORU ADEDİ</label>
                        <input type="number" id="studyQuestionCount" value="10" min="1" class="w-full p-2 bg-white dark:bg-zinc-800 rounded-lg text-sm font-bold outline-none border border-gray-200 dark:border-zinc-600 text-center text-blue-600 dark:text-blue-400">
                    </div>
                </div>
                
                <div id="studyMenu" class="grid grid-cols-1 gap-3 pb-4">
                    <!-- Orijinal Yöntemler -->
                    <button onclick="startActivity('flashcards')" class="p-4 bg-white dark:bg-zinc-700 rounded-xl flex items-center gap-4 border border-gray-100 dark:border-zinc-600 shadow-sm hover:border-blue-500 transition text-left">
                        <div class="text-3xl">🃏</div>
                        <div><div class="font-bold text-gray-900 dark:text-white">Flashcards</div><div class="text-xs text-gray-500">Kelimeleri çevirerek test et.</div></div>
                    </button>
                    <button onclick="startActivity('quiz')" class="p-4 bg-white dark:bg-zinc-700 rounded-xl flex items-center gap-4 border border-gray-100 dark:border-zinc-600 shadow-sm hover:border-blue-500 transition text-left">
                        <div class="text-3xl">🎯</div>
                        <div><div class="font-bold text-gray-900 dark:text-white">Çoktan Seçmeli (EN ➔ TR)</div><div class="text-xs text-gray-500">İngilizce kelimenin Türkçesini bul.</div></div>
                    </button>
                    <button onclick="startActivity('reverseQuiz')" class="p-4 bg-indigo-50 dark:bg-indigo-900/20 rounded-xl flex items-center gap-4 border border-indigo-100 dark:border-indigo-800 shadow-sm hover:border-indigo-500 transition text-left">
                        <div class="text-3xl">🔄</div>
                        <div><div class="font-bold text-indigo-700 dark:text-indigo-400">Ters Çoktan Seçmeli (TR ➔ EN)</div><div class="text-xs text-indigo-600 opacity-80">Türkçe kelimenin İngilizcesini bul.</div></div>
                    </button>
                    <button onclick="startActivity('trueFalse')" class="p-4 bg-rose-50 dark:bg-rose-900/20 rounded-xl flex items-center gap-4 border border-rose-100 dark:border-rose-800 shadow-sm hover:border-rose-500 transition text-left">
                        <div class="text-3xl">⚖️</div>
                        <div><div class="font-bold text-rose-700 dark:text-rose-400">Doğru / Yanlış</div><div class="text-xs text-rose-600 opacity-80">Ekranda verilen çeviri doğru mu test et.</div></div>
                    </button>
                    <button onclick="startActivity('writing')" class="p-4 bg-white dark:bg-zinc-700 rounded-xl flex items-center gap-4 border border-gray-100 dark:border-zinc-600 shadow-sm hover:border-blue-500 transition text-left">
                        <div class="text-3xl">✍️</div>
                        <div><div class="font-bold text-gray-900 dark:text-white">Kelime Yazma</div><div class="text-xs text-gray-500">Anlamı gör, İngilizcesini klavyeyle yaz.</div></div>
                    </button>
                    <button onclick="startActivity('scramble')" class="p-4 bg-amber-50 dark:bg-amber-900/20 rounded-xl flex items-center gap-4 border border-amber-100 dark:border-amber-800 shadow-sm hover:border-amber-500 transition text-left">
                        <div class="text-3xl">🌪️</div>
                        <div><div class="font-bold text-amber-700 dark:text-amber-400">Harf Karıştırma</div><div class="text-xs text-amber-600 opacity-80">Karışık harfleri düzene sokarak kelimeyi bul.</div></div>
                    </button>
                    <button onclick="startActivity('listening')" class="p-4 bg-blue-50 dark:bg-blue-900/20 rounded-xl flex items-center gap-4 border border-blue-100 dark:border-blue-800 shadow-sm hover:border-blue-500 transition text-left">
                        <div class="text-3xl">🎧</div>
                        <div><div class="font-bold text-blue-700 dark:text-blue-400">Dinleme Testi</div><div class="text-xs text-blue-500 opacity-80">Okunuşu dinle ve doğru kelimeyi yaz.</div></div>
                    </button>
                    <button onclick="startActivity('missingChar')" class="p-4 bg-emerald-50 dark:bg-emerald-900/20 rounded-xl flex items-center gap-4 border border-emerald-100 dark:border-emerald-800 shadow-sm hover:border-emerald-500 transition text-left">
                        <div class="text-3xl">🧩</div>
                        <div><div class="font-bold text-emerald-700 dark:text-emerald-400">Eksik Harf</div><div class="text-xs text-emerald-600 opacity-80">Sesli harfleri eksik kelimeyi tahmin et.</div></div>
                    </button>
                    <button onclick="startActivity('wordType')" class="p-4 bg-purple-50 dark:bg-purple-900/20 rounded-xl flex items-center gap-4 border border-purple-100 dark:border-purple-800 shadow-sm hover:border-purple-500 transition text-left">
                        <div class="text-3xl">🏷️</div>
                        <div><div class="font-bold text-purple-700 dark:text-purple-400">Kelime Türü</div><div class="text-xs text-purple-600 opacity-80">Kelimenin isim mi, fiil mi olduğunu bul.</div></div>
                    </button>

                    <!-- YENİ EKLENEN 10 ÇALIŞMA ŞEKLİ -->
                    <button onclick="startActivity('speedQuiz')" class="p-4 bg-orange-50 dark:bg-orange-900/20 rounded-xl flex items-center gap-4 border border-orange-100 dark:border-orange-800 shadow-sm hover:border-orange-500 transition text-left">
                        <div class="text-3xl">⚡</div>
                        <div><div class="font-bold text-orange-700 dark:text-orange-400">Zamana Karşı Seçim</div><div class="text-xs text-orange-600">Saniyelerle yarışarak doğru anlamı seç.</div></div>
                    </button>
                    <button onclick="startActivity('voiceSelection')" class="p-4 bg-teal-50 dark:bg-teal-900/20 rounded-xl flex items-center gap-4 border border-teal-100 dark:border-teal-800 shadow-sm hover:border-teal-500 transition text-left">
                        <div class="text-3xl">🔊</div>
                        <div><div class="font-bold text-teal-700 dark:text-teal-400">Sesli Seçenek (Ses ➔ TR)</div><div class="text-xs text-teal-600">Yalnızca telaffuzu dinle, Türkçe karşılığını seç.</div></div>
                    </button>
                    <button onclick="startActivity('voiceSelectionEng')" class="p-4 bg-sky-50 dark:bg-sky-900/20 rounded-xl flex items-center gap-4 border border-sky-100 dark:border-sky-800 shadow-sm hover:border-sky-500 transition text-left">
                        <div class="text-3xl">🎵</div>
                        <div><div class="font-bold text-sky-700 dark:text-sky-400">Ses Kulaklığı (Ses ➔ EN)</div><div class="text-xs text-sky-600">Sesi dinle ve yazılışını şıklardan bul.</div></div>
                    </button>
                    <button onclick="startActivity('spellingChoice')" class="p-4 bg-cyan-50 dark:bg-cyan-900/20 rounded-xl flex items-center gap-4 border border-cyan-100 dark:border-cyan-800 shadow-sm hover:border-cyan-500 transition text-left">
                        <div class="text-3xl">🔍</div>
                        <div><div class="font-bold text-cyan-700 dark:text-cyan-400">Doğru Yazılış Testi</div><div class="text-xs text-cyan-600">Yazım hatalı şıklar arasından doğru olanı bul.</div></div>
                    </button>
                    <button onclick="startActivity('firstLetterQuiz')" class="p-4 bg-fuchsia-50 dark:bg-fuchsia-900/20 rounded-xl flex items-center gap-4 border border-fuchsia-100 dark:border-fuchsia-800 shadow-sm hover:border-fuchsia-500 transition text-left">
                        <div class="text-3xl">🅰️</div>
                        <div><div class="font-bold text-fuchsia-700 dark:text-fuchsia-400">İlk Harf Bulmaca</div><div class="text-xs text-fuchsia-600">Anlamı verilen kelimenin ilk harfini seç.</div></div>
                    </button>
                    <button onclick="startActivity('lastLetterQuiz')" class="p-4 bg-pink-50 dark:bg-pink-900/20 rounded-xl flex items-center gap-4 border border-pink-100 dark:border-pink-800 shadow-sm hover:border-pink-500 transition text-left">
                        <div class="text-3xl">💤</div>
                        <div><div class="font-bold text-pink-700 dark:text-pink-400">Son Harf Bulmaca</div><div class="text-xs text-pink-600">Anlamı verilen kelimenin son harfini tahmin et.</div></div>
                    </button>
                    <button onclick="startActivity('levelQuiz')" class="p-4 bg-lime-50 dark:bg-lime-900/20 rounded-xl flex items-center gap-4 border border-lime-100 dark:border-lime-800 shadow-sm hover:border-lime-500 transition text-left">
                        <div class="text-3xl">📊</div>
                        <div><div class="font-bold text-lime-700 dark:text-lime-400">Seviye Tahmini</div><div class="text-xs text-lime-600">Kelimenin hangi zorluk seviyesinde (A1-B2) olduğunu bul.</div></div>
                    </button>
                    <button onclick="startActivity('definitionMatch')" class="p-4 bg-yellow-50 dark:bg-yellow-900/20 rounded-xl flex items-center gap-4 border border-yellow-100 dark:border-yellow-800 shadow-sm hover:border-yellow-500 transition text-left">
                        <div class="text-3xl">🎓</div>
                        <div><div class="font-bold text-yellow-700 dark:text-yellow-400">İngilizce Tanım Testi</div><div class="text-xs text-yellow-600">İngilizce açıklaması verilen kelimeyi bul.</div></div>
                    </button>
                    <button onclick="startActivity('letterCountQuiz')" class="p-4 bg-violet-50 dark:bg-violet-900/20 rounded-xl flex items-center gap-4 border border-violet-100 dark:border-violet-800 shadow-sm hover:border-violet-500 transition text-left">
                        <div class="text-3xl">📏</div>
                        <div><div class="font-bold text-violet-700 dark:text-violet-400">Harf Sayısı Sayacı</div><div class="text-xs text-violet-600">Kelimenin kaç harften oluştuğunu tahmin et.</div></div>
                    </button>
                    <button onclick="startActivity('hardcoreSrs')" class="p-4 bg-red-50 dark:bg-red-900/20 rounded-xl flex items-center gap-4 border border-red-100 dark:border-red-800 shadow-sm hover:border-red-500 transition text-left">
                        <div class="text-3xl">🔥</div>
                        <div><div class="font-bold text-red-700 dark:text-red-400">Zor Kelime Maratonu</div><div class="text-xs text-red-600">Sadece en az bildiğin (SRS seviyesi düşük) kelimeler gelir.</div></div>
                    </button>
                </div>

                <div id="gameArea" class="hidden space-y-6">
                    <div class="flex justify-between items-center text-sm text-gray-400 bg-gray-50 dark:bg-zinc-700/50 p-3 rounded-xl">
                        <span id="gameProgress" class="font-bold text-gray-700 dark:text-gray-200">Soru: 0/0</span>
                        <div id="timerDisplay" class="hidden text-orange-500 font-bold bg-orange-50 px-2 py-0.5 rounded">Süre: 10</div>
                        <button onclick="stopActivity()" class="bg-white dark:bg-zinc-600 px-3 py-1 rounded-lg text-red-500 font-bold hover:bg-red-50 dark:hover:bg-zinc-500 transition">✕ Çıkış</button>
                    </div>

                    <!-- Flashcard Görünümü -->
                    <div id="flashcardView" class="hidden">
                        <div id="flashcardElement" class="flip-card w-full h-72 cursor-pointer mb-6" onclick="this.classList.toggle('flipped')">
                            <div class="flip-card-inner w-full h-full">
                                <div class="flip-card-front bg-blue-600 text-white">
                                    <button onclick="event.stopPropagation(); playVoice(document.getElementById('cardEng').innerText)" class="absolute top-4 right-4 text-2xl bg-white/20 p-2 rounded-full hover:bg-white/30 transition">🔊</button>
                                    <span id="cardEng" class="text-4xl font-bold">Word</span>
                                    <span class="text-sm opacity-80 mt-6 bg-black/20 px-4 py-1.5 rounded-full font-medium">Karta dokunarak çevir 🔄</span>
                                </div>
                                <div class="flip-card-back bg-emerald-600 text-white">
                                    <span id="cardTr" class="text-4xl font-bold">Kelime</span>
                                    <span class="text-sm opacity-80 mt-6 font-medium">Öğrenme Durumunu Seç:</span>
                                </div>
                            </div>
                        </div>
                        <div class="flex justify-center space-x-3">
                            <button onclick="handleReview(false)" class="flex-1 bg-red-500 text-white py-4 rounded-xl font-bold text-lg hover:bg-red-600 transition shadow-lg">Bilemedim ❌</button>
                            <button onclick="handleReview(true)" class="flex-1 bg-emerald-500 text-white py-4 rounded-xl font-bold text-lg hover:bg-emerald-600 transition shadow-lg">Bildim ✔️</button>
                        </div>
                    </div>

                    <!-- Butonlu Test Görünümü -->
                    <div id="quizView" class="hidden space-y-4">
                        <div class="bg-gray-50 dark:bg-zinc-700 p-6 rounded-2xl text-center relative border border-gray-200 dark:border-zinc-600 shadow-sm">
                            <button id="quizVoiceBtn" class="absolute top-4 right-4 text-xl">🔊</button>
                            <span id="quizSubtitle" class="text-xs text-blue-500 font-bold block mb-2">SORU</span>
                            <h3 id="quizQuestion" class="text-3xl font-bold text-gray-800 dark:text-gray-100 min-h-[40px]"></h3>
                        </div>
                        <div id="quizOptions" class="grid grid-cols-1 gap-3"></div>
                        <button id="nextBtn" onclick="nextQuestion()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hidden shadow-lg">Sonraki Soru ➔</button>
                    </div>

                    <!-- Klavyeli Yazı Görünümü -->
                    <div id="inputBasedView" class="hidden space-y-4">
                        <div id="inputBoxContainer" class="bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-100 dark:border-emerald-800 p-6 rounded-2xl text-center relative">
                            <button id="playAudioBtn" onclick="playVoice(correctAnswer)" class="hidden absolute top-4 right-4 bg-emerald-200 dark:bg-emerald-800 p-2 rounded-full text-xl shadow-sm">🔊</button>
                            <span id="inputSubtitle" class="text-xs text-emerald-600 dark:text-emerald-400 font-bold block mb-2">BAŞLIK</span>
                            <h3 id="inputQuestion" class="text-3xl font-bold text-emerald-700 dark:text-emerald-300"></h3>
                        </div>
                        <input type="text" id="gameInput" autocomplete="off" placeholder="Cevabı buraya yaz..." class="w-full p-4 text-center text-2xl font-bold bg-white dark:bg-zinc-700 rounded-xl outline-none border-2 border-gray-200 dark:border-zinc-600 focus:border-blue-500 shadow-sm transition">
                        <button onclick="checkInputGame()" class="w-full bg-blue-600 hover:bg-blue-700 transition text-white py-4 rounded-xl font-bold shadow-lg">Cevabı Kontrol Et</button>
                        <div id="inputResult" class="text-center font-bold text-xl p-4 rounded-xl hidden"></div>
                        <button id="inputNextBtn" onclick="nextQuestion()" class="w-full bg-gray-800 dark:bg-gray-100 dark:text-zinc-900 text-white py-4 rounded-xl font-bold hidden transition">Sonraki Soru ➔</button>
                    </div>
                </div>
            </section>

            <section id="screen-ai" class="hidden space-y-4">
                <h2 class="text-xl font-bold">🌍 Akıllı Sözlük & Çeviri</h2>
                <div class="relative">
                    <input type="text" id="aiWordInput" list="aiDatalist" placeholder="Defterinden seç veya yeni kelime yaz..." class="w-full p-4 font-medium bg-white dark:bg-zinc-700 rounded-xl outline-none border-2 border-gray-200 dark:border-zinc-600 focus:border-blue-500 shadow-sm transition">
                    <datalist id="aiDatalist"></datalist>
                </div>
                <button onclick="fetchDictionaryData()" class="w-full bg-blue-600 hover:bg-blue-700 transition text-white py-4 rounded-xl font-bold shadow-lg flex justify-center items-center gap-2"><span class="text-xl">🔍</span> İnternette Ara</button>
                <div id="aiResult" class="p-5 bg-white dark:bg-zinc-700/50 rounded-xl text-sm min-h-[200px] whitespace-pre-line leading-relaxed border border-gray-100 dark:border-zinc-700 shadow-sm hidden"></div>
            </section>

            <section id="screen-settings" class="hidden space-y-6">
                <h2 class="text-xl font-bold">Ayarlar</h2>
                <div class="space-y-4 bg-white dark:bg-zinc-800 p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-zinc-700">
                    <button onclick="loadMockData()" class="w-full text-left p-4 text-blue-600 dark:text-blue-400 font-bold hover:bg-blue-50 dark:hover:bg-zinc-700 rounded-xl flex items-center transition"><span class="text-xl mr-3">⚡</span> Hazır Kelimeleri Yükle</button>
                    <hr class="border-gray-100 dark:border-zinc-700">
                    <button onclick="resetData()" class="w-full text-left p-4 text-red-500 font-bold hover:bg-red-50 dark:hover:bg-zinc-700 rounded-xl flex items-center transition"><span class="text-xl mr-3">🚨</span> Tüm Defteri Sıfırla (Sil)</button>
                </div>
            </section>

        </main>

        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md h-[70px] border-t border-gray-200 dark:border-zinc-700 bg-white dark:bg-zinc-800 flex justify-around items-center text-[10px] font-bold z-50 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] pb-safe">
            <button onclick="switchTab('dashboard')" class="flex flex-col items-center space-y-1 text-gray-400 active-tab w-full py-2" id="tab-dashboard"><span class="text-2xl mb-1">📊</span><span>ÖZET</span></button>
            <button onclick="switchTab('words')" class="flex flex-col items-center space-y-1 text-gray-400 w-full py-2" id="tab-words"><span class="text-2xl mb-1">📖</span><span>DEFTER</span></button>
            <button onclick="switchTab('study')" class="flex flex-col items-center space-y-1 text-gray-400 w-full py-2" id="tab-study"><span class="text-2xl mb-1">🎯</span><span>ÇALIŞMA</span></button>
            <button onclick="switchTab('ai')" class="flex flex-col items-center space-y-1 text-gray-400 w-full py-2" id="tab-ai"><span class="text-2xl mb-1">🌍</span><span>SÖZLÜK</span></button>
            <button onclick="switchTab('settings')" class="flex flex-col items-center space-y-1 text-gray-400 w-full py-2" id="tab-settings"><span class="text-2xl mb-1">⚙️</span><span>AYARLAR</span></button>
        </nav>

        <!-- Kelime Ekleme Modalı -->
        <div id="addModal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-end justify-center transition-opacity backdrop-blur-sm">
            <div class="bg-white dark:bg-zinc-800 w-full max-w-md rounded-t-[30px] p-6 space-y-5 shadow-2xl">
                <div class="flex justify-between items-center mb-2">
                    <h3 id="modalTitle" class="text-xl font-bold">Yeni Kelime Ekle</h3>
                    <button onclick="closeModal()" class="text-gray-400 bg-gray-100 dark:bg-zinc-700 rounded-full w-8 h-8 flex justify-center items-center font-bold hover:bg-gray-200">✕</button>
                </div>
                <input type="hidden" id="editId">
                <div>
                    <label class="text-xs font-bold text-gray-400 ml-1">İNGİLİZCE KELİME</label>
                    <input type="text" id="addEng" class="w-full p-4 mt-1 bg-gray-50 dark:bg-zinc-900 border border-gray-200 dark:border-zinc-700 rounded-xl outline-none focus:border-blue-500 transition">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 ml-1">TÜRKÇE ANLAMI</label>
                    <input type="text" id="addTr" class="w-full p-4 mt-1 bg-gray-50 dark:bg-zinc-900 border border-gray-200 dark:border-zinc-700 rounded-xl outline-none focus:border-blue-500 transition">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-gray-400 ml-1">TÜRÜ</label>
                        <select id="addType" class="w-full p-4 mt-1 bg-gray-50 dark:bg-zinc-900 border border-gray-200 dark:border-zinc-700 rounded-xl outline-none">
                            <option value="Noun">İsim (Noun)</option>
                            <option value="Verb">Fiil (Verb)</option>
                            <option value="Adjective">Sıfat (Adj)</option>
                            <option value="Adverb">Zarf (Adv)</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 ml-1">SEVİYE</label>
                        <select id="addLevel" class="w-full p-4 mt-1 bg-gray-50 dark:bg-zinc-900 border border-gray-200 dark:border-zinc-700 rounded-xl outline-none">
                            <option value="A1" selected>A1</option><option value="A2">A2</option><option value="B1">B1</option><option value="B2">B2</option><option value="C1">C1</option>
                        </select>
                    </div>
                </div>
                <button onclick="saveWord()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold text-lg mt-4 shadow-lg">Deftere Kaydet</button>
            </div>
        </div>

    </div>

    <script>
        let words = JSON.parse(localStorage.getItem('vocab_words')) || [];
        let isDarkMode = localStorage.getItem('vocab_dark_mode') === 'true';

        let currentActivity = '';
        let studyList = [];
        let gameIndex = 0;
        let correctAnswer = '';
        let speedTimer = null;
        let timeLeft = 10;
        
        let currentPage = 1;
        const wordsPerPage = 30; 

        window.onload = function() {
            if(isDarkMode) document.documentElement.classList.add('dark');
            initApp();
        };

        function initApp() {
            localStorage.setItem('vocab_words', JSON.stringify(words));
            renderDashboard();
            renderWordsList(true);
            updateDatalist();
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `p-3 rounded-xl shadow-xl text-white font-bold text-sm flex items-center justify-between transform transition-all duration-300 translate-y-2 opacity-0 pointer-events-auto bg-zinc-950 dark:bg-zinc-100 dark:text-zinc-900`;
            toast.innerHTML = `<span>${message}</span><span class="ml-2">${type === 'danger' ? '🗑️' : '✨'}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove('opacity-0', 'translate-y-2'); }, 50);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-[-10px]');
                setTimeout(() => { toast.remove(); }, 300);
            }, 2500);
        }

        function switchTab(tabName) {
            stopTimer();
            ['dashboard', 'words', 'study', 'ai', 'settings'].forEach(t => {
                document.getElementById(`screen-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('active-tab');
            });
            document.getElementById(`screen-${tabName}`).classList.remove('hidden');
            document.getElementById(`tab-${tabName}`).classList.add('active-tab');
            
            if(tabName === 'study') {
                document.getElementById('studyMenu').classList.remove('hidden');
                document.getElementById('gameArea').classList.add('hidden');
            }
        }

        function playVoice(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.85;
                window.speechSynthesis.speak(utterance);
            }
        }

        function openModal(id = null) {
            const modal = document.getElementById('addModal');
            document.getElementById('modalTitle').innerText = id ? 'Kelimeyi Düzenle' : 'Yeni Kelime Ekle';
            if(id) {
                const w = words.find(x => x.id === id);
                document.getElementById('editId').value = w.id;
                document.getElementById('addEng').value = w.english;
                document.getElementById('addTr').value = w.turkish;
                document.getElementById('addType').value = w.wordType;
                document.getElementById('addLevel').value = w.level;
            } else {
                document.getElementById('editId').value = '';
                document.getElementById('addEng').value = '';
                document.getElementById('addTr').value = '';
            }
            modal.classList.remove('hidden');
        }

        function closeModal() { document.getElementById('addModal').classList.add('hidden'); }

        function saveWord() {
            const id = document.getElementById('editId').value;
            const eng = document.getElementById('addEng').value.trim();
            const tr = document.getElementById('addTr').value.trim();
            const type = document.getElementById('addType').value;
            const level = document.getElementById('addLevel').value;
            if(!eng || !tr) return showToast('Lütfen boş alan bırakmayın.', 'danger');

            if(id) {
                words = words.map(w => w.id == id ? {...w, english: eng, turkish: tr, wordType: type, level: level} : w);
                showToast('Kelime güncellendi!');
            } else {
                words.push({ id: Date.now(), english: eng, turkish: tr, wordType: type, level: level, isFavorite: false, reviewStage: 0, nextReviewDate: new Date().toISOString() });
                showToast('Kelime deftere eklendi!');
            }
            initApp();
            closeModal();
        }

        function deleteWord(id) {
            words = words.filter(w => w.id !== id);
            initApp();
            showToast('Kelime listeden silindi.', 'danger');
        }

        function toggleFav(id) {
            words = words.map(w => w.id === id ? {...w, isFavorite: !w.isFavorite} : w);
            initApp();
        }

        function renderDashboard() {
            document.getElementById('statTotal').innerText = words.length;
            const today = new Date();
            document.getElementById('statReview').innerText = words.filter(w => new Date(w.nextReviewDate) <= today).length;
            const learned = words.filter(w => w.reviewStage >= 10).length;
            const percent = words.length === 0 ? 0 : Math.round((learned / words.length) * 100);
            
            document.getElementById('progressPercent').innerText = `%${percent}`;
            document.getElementById('progressBar').style.width = `${percent}%`;
            document.getElementById('progressText').innerText = `${learned} / ${words.length} Kelime Tamamen Öğrenildi`;

            const recentContainer = document.getElementById('recentWordsList');
            const recentWords = [...words].reverse().slice(0, 10);
            
            if(recentWords.length === 0) {
                recentContainer.innerHTML = '<div class="text-sm text-gray-400 p-4 bg-gray-50 dark:bg-zinc-800 rounded-xl border border-dashed border-gray-300 dark:border-zinc-600 text-center">Henüz kelime eklenmemiş.</div>';
            } else {
                let html = '';
                recentWords.forEach(w => {
                    html += `
                        <div class="flex justify-between items-center p-3 bg-white dark:bg-zinc-800 border border-gray-100 dark:border-zinc-700 rounded-xl shadow-sm mb-1.5 text-xs">
                            <div class="flex items-center gap-2">
                                <div class="w-7 h-7 bg-blue-50 dark:bg-blue-900/30 rounded-full flex items-center justify-center text-blue-600 font-bold text-[10px]">${w.level}</div>
                                <div>
                                    <div class="font-bold text-gray-800 dark:text-gray-100">${w.english}</div>
                                    <div class="text-gray-400">${w.turkish}</div>
                                </div>
                            </div>
                            <button onclick="playVoice('${w.english}')" class="text-sm text-gray-400 hover:text-blue-500">🔊</button>
                        </div>
                    `;
                });
                recentContainer.innerHTML = html;
            }
        }

        function renderWordsList(reset = false) {
            const container = document.getElementById('wordsList');
            if(reset) {
                currentPage = 1;
                container.innerHTML = '';
            }

            const lvlF = document.getElementById('listLevelFilter').value;
            const typF = document.getElementById('listTypeFilter').value;

            let filtered = [...words].reverse();
            if(lvlF !== 'ALL') filtered = filtered.filter(w => w.level === lvlF);
            if(typF !== 'ALL') filtered = filtered.filter(w => w.wordType === typF);

            if(filtered.length === 0) {
                if(reset) container.innerHTML = '<div class="text-center text-gray-400 py-10 text-sm">Filtreye uygun kelime bulunamadı.</div>';
                return;
            }

            const startIdx = (currentPage - 1) * wordsPerPage;
            const endIdx = startIdx + wordsPerPage;
            const wordsToShow = filtered.slice(startIdx, endIdx);

            let htmlChunk = '';
            wordsToShow.forEach(w => {
                htmlChunk += `
                    <div class="p-3 bg-white dark:bg-zinc-800 border border-gray-100 dark:border-zinc-700 shadow-sm rounded-xl flex flex-col gap-1 relative text-sm">
                        <div class="flex justify-between items-start">
                            <div class="flex items-center gap-2">
                                <span class="font-bold text-base text-gray-900 dark:text-white">${w.english}</span>
                                <span class="text-[9px] px-1.5 py-0.5 bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300 rounded font-bold">${w.wordType}</span>
                                <span class="text-[9px] px-1.5 py-0.5 bg-gray-100 dark:bg-zinc-700 text-gray-600 dark:text-gray-300 rounded font-bold">${w.level}</span>
                            </div>
                            <div class="flex items-center gap-1">
                                <button onclick="toggleFav(${w.id})" class="p-1">${w.isFavorite ? '⭐' : '<span class="opacity-20">⭐</span>'}</button>
                                <button onclick="openModal(${w.id})" class="p-1 text-gray-400 hover:text-blue-500">✏️</button>
                                <button onclick="deleteWord(${w.id})" class="p-1 text-gray-400 hover:text-red-500">🗑️</button>
                            </div>
                        </div>
                        <div class="text-gray-600 dark:text-gray-300 font-medium text-xs">
                            TR: <span class="text-blue-600 dark:text-blue-400">${w.turkish}</span>
                        </div>
                        <button onclick="playVoice('${w.english}')" class="absolute bottom-2 right-2 bg-gray-100 dark:bg-zinc-700 p-1.5 rounded-full shadow-sm hover:bg-gray-200 transition text-xs">🔊</button>
                    </div>
                `;
            });

            const existingBtn = document.getElementById('loadMoreBtn');
            if (existingBtn) existingBtn.remove();
            container.insertAdjacentHTML('beforeend', htmlChunk);

            if (endIdx < filtered.length) {
                container.insertAdjacentHTML('beforeend', `
                    <button id="loadMoreBtn" onclick="loadMoreWords()" class="w-full bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 py-2 rounded-xl font-bold mt-2 hover:bg-blue-100 text-xs border border-dashed border-blue-200">
                        Daha Fazla Göster (${endIdx} / ${filtered.length}) ↓
                    </button>
                `);
            }
        }

        function loadMoreWords() {
            currentPage++;
            renderWordsList(false);
        }

        // --- ARALIKLI TEKRAR (SRS) VE YENİ MOTOR ---
        function startActivity(type) {
            const levelFilter = document.getElementById('studyLevelFilter').value;
            let desiredCount = parseInt(document.getElementById('studyQuestionCount').value);
            if(isNaN(desiredCount) || desiredCount < 1) desiredCount = 10;
            
            let pool = levelFilter === 'ALL' ? words : words.filter(w => w.level === levelFilter);
            
            if(pool.length === 0) return alert('Seçili kriterde defterinizde kelime bulunmuyor.');
            if(pool.length < 4 && !['flashcards', 'writing', 'scramble', 'listening', 'missingChar'].includes(type)) {
                return alert(`Çoktan seçmeli etkinlikler için en az 4 kelimeniz olmalıdır.`);
            }
            
            currentActivity = type;
            let actualCount = Math.min(desiredCount, pool.length);

            // Akıllı SRS Algoritması: Bilinmeyen kelimelerin ağırlığı yüksek olur ve üst sıralara yerleşir
            let weightedList = pool.map(w => {
                let stage = w.reviewStage || 0; 
                let weight = (35 - stage) * (Math.random() * 1.5 + 0.5); // Küçük stage'e sahip olanlar üstte kalır
                if(type === 'hardcoreSrs') weight = (50 - stage); // Maraton modunda ekstra zorlama
                return { word: w, weight: weight };
            });

            weightedList.sort((a, b) => b.weight - a.weight);
            studyList = weightedList.map(item => item.word).slice(0, actualCount);
            gameIndex = 0;
            
            document.getElementById('studyMenu').classList.add('hidden');
            document.getElementById('gameArea').classList.remove('hidden');
            ['flashcardView', 'quizView', 'inputBasedView'].forEach(id => document.getElementById(id).classList.add('hidden'));
            
            if(type === 'flashcards') document.getElementById('flashcardView').classList.remove('hidden');
            else if(['writing', 'listening', 'missingChar', 'scramble'].includes(type)) document.getElementById('inputBasedView').classList.remove('hidden');
            else document.getElementById('quizView').classList.remove('hidden');
            
            loadQuestion();
        }

        function stopActivity() {
            stopTimer();
            switchTab('study');
        }

        function stopTimer() {
            if(speedTimer) clearInterval(speedTimer);
            document.getElementById('timerDisplay').classList.add('hidden');
        }

        function startSpeedTimer() {
            stopTimer();
            timeLeft = 7;
            const display = document.getElementById('timerDisplay');
            display.classList.remove('hidden');
            display.innerText = `Süre: ${timeLeft}`;
            
            speedTimer = setInterval(() => {
                timeLeft--;
                display.innerText = `Süre: ${timeLeft}`;
                if(timeLeft <= 0) {
                    clearInterval(speedTimer);
                    // Süre bittiğinde otomatik yanlış say
                    showTimeoutAnswer();
                }
            }, 1000);
        }

        function showTimeoutAnswer() {
            const buttons = document.getElementById('quizOptions').getElementsByTagName('button');
            for(let b of buttons) {
                b.disabled = true;
                if(b.innerText.includes(correctAnswer) || b.getAttribute('data-ans') === correctAnswer) {
                    b.className = 'w-full p-4 rounded-xl font-bold border-2 text-base bg-emerald-500 text-white text-center';
                }
            }
            showToast('Süre doldu!', 'danger');
            document.getElementById('nextBtn').classList.remove('hidden');
        }

        function makeTypo(word) {
            if(word.length <= 4) return word + "s";
            let idx = Math.floor(Math.random() * (word.length - 2)) + 1;
            return word.substring(0, idx) + word[idx+1] + word[idx] + word.substring(idx+2);
        }

        function loadQuestion() {
            stopTimer();
            if(gameIndex >= studyList.length) {
                showToast('🎉 Tebrikler! Çalışmayı tamamladın.');
                return switchTab('study');
            }
            
            document.getElementById('gameProgress').innerText = `Soru: ${gameIndex + 1}/${studyList.length}`;
            const word = studyList[gameIndex];
            
            document.getElementById('nextBtn').classList.add('hidden');
            const qTitle = document.getElementById('quizSubtitle');
            const qQuestion = document.getElementById('quizQuestion');
            const qVoiceBtn = document.getElementById('quizVoiceBtn');
            const qOptions = document.getElementById('quizOptions');
            
            const gameInput = document.getElementById('gameInput');
            const inputRes = document.getElementById('inputResult');
            const inNextBtn = document.getElementById('inputNextBtn');
            const inTitle = document.getElementById('inputSubtitle');
            const inQuestion = document.getElementById('inputQuestion');
            const playAudioBtn = document.getElementById('playAudioBtn');
            
            gameInput.value = '';
            gameInput.disabled = false;
            inputRes.classList.add('hidden');
            inNextBtn.classList.add('hidden');
            playAudioBtn.classList.add('hidden');
            qVoiceBtn.classList.add('hidden');
            
            // 1. FLASHCARDS
            if(currentActivity === 'flashcards') {
                document.getElementById('flashcardElement').classList.remove('flipped');
                document.getElementById('cardEng').innerText = word.english;
                document.getElementById('cardTr').innerText = word.turkish;
            } 
            // 2. ÇOKTAN SEÇMELİ (EN -> TR) & ZAMANA KARŞI & HARDCORE MARATON
            else if(['quiz', 'speedQuiz', 'hardcoreSrs'].includes(currentActivity)) {
                correctAnswer = word.turkish;
                qTitle.innerText = currentActivity === 'speedQuiz' ? "⚡ ZAMANA KARŞI HIZLI SEÇİM!" : "BU KELİMENİN TÜRKÇESİ NEDİR?";
                qQuestion.innerHTML = `<span class="text-blue-600 dark:text-blue-400">${word.english}</span>`;
                qVoiceBtn.onclick = () => playVoice(word.english);
                qVoiceBtn.classList.remove('hidden');
                if(currentActivity === 'speedQuiz') startSpeedTimer();
                
                let options = [word.turkish];
                let wp = words.filter(w => w.turkish !== word.turkish).sort(() => Math.random() - 0.5);
                for(let i=0; i<3; i++) if(wp[i]) options.push(wp[i].turkish);
                options.sort(() => Math.random() - 0.5);

                qOptions.innerHTML = '';
                options.forEach(opt => {
                    qOptions.innerHTML += `<button onclick="checkMultipleChoice(this, '${opt}')" class="w-full p-3.5 bg-white dark:bg-zinc-700 rounded-xl font-bold border-2 border-gray-100 dark:border-zinc-600 shadow-sm hover:border-blue-500 text-sm text-left pl-6">${opt}</button>`;
                });
            }
            // 3. TERS ÇOKTAN SEÇMELİ
            else if(currentActivity === 'reverseQuiz') {
                correctAnswer = word.english;
                qTitle.innerText = "BU KELİMENİN İNGİLİZCESİ NEDİR?";
                qQuestion.innerHTML = `<span class="text-indigo-600 dark:text-indigo-400">${word.turkish}</span>`;
                
                let options = [word.english];
                let wp = words.filter(w => w.english !== word.english).sort(() => Math.random() - 0.5);
                for(let i=0; i<3; i++) if(wp[i]) options.push(wp[i].english);
                options.sort(() => Math.random() - 0.5);

                qOptions.innerHTML = '';
                options.forEach(opt => {
                    qOptions.innerHTML += `<button onclick="checkMultipleChoice(this, '${opt}')" class="w-full p-3.5 bg-white dark:bg-zinc-700 rounded-xl font-bold border-2 border-gray-100 dark:border-zinc-600 shadow-sm hover:border-indigo-500 text-sm text-left pl-6">${opt}</button>`;
                });
            }
            // 4. DOĞRU / YANLIŞ
            else if(currentActivity === 'trueFalse') {
                let isCorrect = Math.random() > 0.5;
                let displayTr = word.turkish;
                if(!isCorrect) {
                    let diff = words.filter(w => w.turkish !== word.turkish);
                    if(diff.length > 0) displayTr = diff[Math.floor(Math.random() * diff.length)].turkish;
                }
                correctAnswer = isCorrect ? "DOĞRU" : "YANLIŞ";
                qTitle.innerText = "EŞLEŞTİRME DOĞRU MU?";
                qQuestion.innerHTML = `<div class="text-xl font-black">${word.english} = <span class="text-rose-500">${displayTr}</span></div>`;
                
                qOptions.innerHTML = `
                    <button onclick="checkMultipleChoice(this, 'DOĞRU')" class="w-full p-4 bg-white dark:bg-zinc-700 rounded-xl font-bold border-2 text-emerald-500">✅ DOĞRU</button>
                    <button onclick="checkMultipleChoice(this, 'YANLIŞ')" class="w-full p-4 bg-white dark:bg-zinc-700 rounded-xl font-bold border-2 text-red-500">❌ YANLIŞ</button>
                `;
            }
            // 5. SESLİ SEÇENEK (SES ➔ TR)
            else if(currentActivity === 'voiceSelection') {
                correctAnswer = word.turkish;
                qTitle.innerText = "TELAFFUZU DİNLE VE ANLAMINI SEÇ";
                qQuestion.innerHTML = `🎵 Ses Çalınıyor...`;
                playVoice(word.english);
                qVoiceBtn.onclick = () => playVoice(word.english);
                qVoiceBtn.classList.remove('hidden');

                let options = [word.turkish];
                let wp = words.filter(w => w.turkish !== word.turkish).sort(() => Math.random() - 0.5);
                for(let i=0; i<3; i++) if(wp[i]) options.push(wp[i].turkish);
                options.sort(() => Math.random() - 0.5);

                qOptions.innerHTML = '';
                options.forEach(opt => {
                    qOptions.innerHTML += `<button onclick="checkMultipleChoice(this, '${opt}')" class="w-full p-3.5 bg-white dark:bg-zinc-700 rounded-xl font-bold border-2 text-sm text-center">${opt}</button>`;
                });
            }
            // 6. SESLİ SEÇENEK (SES ➔ EN)
            else if(currentActivity === 'voiceSelectionEng') {
                correctAnswer = word.english;
                qTitle.innerText = "SESİ DUYULAN KELİMEYİ SEÇİN";
                qQuestion.innerHTML = `🎧 Kelimeyi Dinleyin`;
                playVoice(word.english);

                let options = [word.english];
                let wp = words.filter(w => w.english !== word.english).sort(() => Math.random() - 0.5);
                for(let i=0; i<3; i++) if(wp[i]) options.push(wp[i].english);
                options.sort(() => Math.random() - 0.5);

                qOptions.innerHTML = '';
                options.forEach(opt => {
                    qOptions.innerHTML += `<button onclick="checkMultipleChoice(this, '${opt}')" class="w-full p-3.5 bg-white dark:bg-zinc-700 rounded-xl font-bold border-2 text-sm text-center">${opt}</button>`;
                });
            }
            // 7. DOĞRU YAZILIŞ SEÇİMİ
            else if(currentActivity === 'spellingChoice') {
                correctAnswer = word.english;
                qTitle.innerText = "HANGİ YAZILIŞ TAMAMEN DOĞRUDUR?";
                qQuestion.innerHTML = `"${word.turkish}"`;

                let options = [word.english, makeTypo(word.english), makeTypo(word.english + "a"), makeTypo(word.english + "e")];
                // Duplicate koruması
                options = [...new Set(options)].slice(0, 4);

        function checkMultipleChoice(btn, selected) {
            stopTimer();
            const buttons = document.getElementById('quizOptions').getElementsByTagName('button');
            for(let b of buttons) b.disabled = true;

            const currentWord = studyList[gameIndex];

            if(selected === correctAnswer) {
                btn.className = 'w-full p-3.5 rounded-xl font-bold border-2 text-sm bg-emerald-500 border-emerald-600 text-white shadow-md text-center';
                updateWordProgress(currentWord.id, true);
            } else {
                btn.className = 'w-full p-3.5 rounded-xl font-bold border-2 text-sm bg-red-500 border-red-600 text-white shadow-md text-center';
                for(let b of buttons) {
                    if(b.innerText.includes(correctAnswer) || b.getAttribute('data-ans') === correctAnswer) {
                        b.className = 'w-full p-3.5 rounded-xl font-bold border-2 text-sm bg-emerald-500 border-emerald-600 text-white text-center';
                    }
                }
                updateWordProgress(currentWord.id, false);
            }
            document.getElementById('nextBtn').classList.remove('hidden');
        }

        function checkInputGame() {
            const gameInput = document.getElementById('gameInput');
            const inputVal = gameInput.value.trim().toLowerCase();
            if(!inputVal) return;
            
            const resultBox = document.getElementById('inputResult');
            gameInput.disabled = true;
            resultBox.classList.remove('hidden');
            
            const currentWord = studyList[gameIndex];

            if(inputVal === correctAnswer) {
                resultBox.innerHTML = '✅ Tebrikler, Doğru!';
                resultBox.className = "text-center font-bold text-sm p-3 rounded-xl bg-emerald-100 text-emerald-700 border border-emerald-200";
                updateWordProgress(currentWord.id, true);
            } else {
                resultBox.innerHTML = `❌ Hatalı Yazım.<br><span class="text-xs">Doğrusu:</span> <span class="text-lg font-bold text-blue-600">${currentWord.english}</span>`;
                resultBox.className = "text-center font-bold text-sm p-3 rounded-xl bg-red-50 text-red-700 border border-red-100";
                updateWordProgress(currentWord.id, false);
            }
            document.getElementById('inputNextBtn').classList.remove('hidden');
        }

        function updateWordProgress(wordId, isCorrect) {
            words = words.map(w => {
                if(w.id === wordId) {
                    let newStage = isCorrect ? (w.reviewStage || 0) + 1 : Math.max(0, (w.reviewStage || 0) - 1);
                    let nextDate = new Date();
                    nextDate.setDate(nextDate.getDate() + (newStage * 2));
                    return { ...w, reviewStage: newStage, nextReviewDate: nextDate.toISOString() };
                }
                return w;
            });
            localStorage.setItem('vocab_words', JSON.stringify(words));
            renderDashboard();
        }

        function handleReview(isCorrect) {
            const word = studyList[gameIndex];
            updateWordProgress(word.id, isCorrect);
            gameIndex++;
            loadQuestion();
        }

        function nextQuestion() {
            gameIndex++;
            loadQuestion();
        }

        function updateDatalist() {
            const datalist = document.getElementById('aiDatalist');
            let dlHtml = '';
            words.forEach(w => { dlHtml += `<option value="${w.english}">`; });
            datalist.innerHTML = dlHtml;
        }

        async function fetchDictionaryData() {
            const input = document.getElementById('aiWordInput');
            const word = input.value.trim().toLowerCase();
            if(!word) return alert('Lütfen arama kutusuna bir kelime yazın.');
            
            const resultBox = document.getElementById('aiResult');
            resultBox.classList.remove('hidden');
            resultBox.innerHTML = '<div class="text-center py-6"><div class="spinner"></div><p class="mt-4 text-gray-500 font-medium text-xs">Sözlük verisi çekiliyor...</p></div>';
            input.blur();

            try {
                const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                if(!res.ok) throw new Error();
                const data = await res.json();
                
                const meaning = data[0].meanings[0];
                const defObj = meaning.definitions[0];
                const engDefinition = defObj.definition;
                let engExample = defObj.example ? defObj.example : `The word "${word}" is commonly used in daily sentences.`;
                let trExample = "Çeviri yükleniyor...";
                
                try {
                    const trRes = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(engExample)}&langpair=en|tr`);
                    const trData = await trRes.json();
                    trExample = trData.responseData.translatedText;
                } catch(e) { trExample = "-"; }

                resultBox.innerHTML = `
                    <div class="flex items-center gap-3 border-b border-gray-100 dark:border-zinc-700 pb-3 mb-4">
                        <button onclick="playVoice('${word}')" class="text-2xl bg-blue-50 dark:bg-blue-900/30 p-2 rounded-full text-blue-500">🔊</button>
                        <div>
                            <strong class="text-xl text-gray-900 dark:text-white capitalize">${word}</strong>
                            <span class="text-xs ml-2 text-gray-400 font-medium">${meaning.partOfSpeech}</span>
                        </div>
                    </div>
                    <div class="mb-4 text-xs">
                        <span class="text-xs font-bold text-blue-500 block mb-1">İNGİLİZCE SÖZLÜK ANLAMI</span>
                        <p class="text-gray-700 dark:text-gray-300 bg-gray-50 dark:bg-zinc-800 p-3 rounded-xl">${engDefinition}</p>
                    </div>
                    <div class="bg-emerald-50 dark:bg-emerald-900/10 p-4 rounded-xl text-xs relative">
                        <button onclick="playVoice('${engExample.replace(/'/g, "")}')" class="absolute top-4 right-4 text-sm opacity-70">🔊</button>
                        <span class="text-xs font-bold text-emerald-600 block mb-2">ÖRNEK CÜMLE</span>
                        <p class="text-gray-800 dark:text-gray-200 font-medium mb-1 pr-6">"${engExample}"</p>
                        <p class="text-emerald-700 dark:text-emerald-400 font-semibold pt-2 border-t border-emerald-200/50">🇹🇷 ${trExample}</p>
                    </div>
                `;
            } catch (e) {
                resultBox.innerHTML = `<div class="text-center py-6"><span class="text-xl">😕</span><p class="text-red-500 text-xs font-bold mt-2">Sözlükte bulunamadı ya da internet bağlantısı yok.</p></div>`;
            }
        }
